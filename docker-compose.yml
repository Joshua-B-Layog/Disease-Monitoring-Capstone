version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cho_cabuyao
      MYSQL_DATABASE: cabuyao_cdms_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env 

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    volumes:
    - ./frontend:/app        
    - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: